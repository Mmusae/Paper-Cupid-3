<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Paper Cupid Letter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Great+Vibes&family=Playfair+Display:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #fff0f2;
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
            background-image: radial-gradient(#ffccd5 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .music-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid #ffb3c1;
            padding: 12px 25px;
            border-radius: 50px;
            position: fixed;
            top: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .spotify-btn {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .spotify-btn:hover { background-color: #7fcb99; }

        .envelope-back {
            background: #fffdf9;
            width: 100%;
            max-width: 550px;
            margin-top: 80px;
            border-radius: 8px;
            padding: 40px 35px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02), 0 15px 35px rgba(224, 150, 160, 0.3), 0 0 0 12px #fffdf9, 0 0 0 15px #ffccd5;
            overflow: hidden;
        }

        .vintage-paper {
            background-image: linear-gradient(rgba(224, 182, 182, 0.12) 1px, transparent 1px);
            background-size: 100% 2.4rem;
            line-height: 2.4rem;
            position: relative;
        }

        .vintage-paper::before {
            content: '💋';
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 2.5rem;
            opacity: 0.25;
            transform: rotate(-15deg);
        }

        .vintage-paper::after {
            content: '💋';
            position: absolute;
            top: 40px;
            right: 15px;
            font-size: 2rem;
            opacity: 0.15;
            transform: rotate(20deg);
        }

        .final-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.75rem;
            color: #2c3e50;
            white-space: pre-wrap;
            word-wrap: break-word;
            user-select: none;
        }

        .gallery-title {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: #d63031;
            margin: 60px 0 20px 0;
            text-align: center;
        }

        .polaroid-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1000px;
            margin-bottom: 40px;
        }

        .polaroid {
            background: white;
            padding: 15px 15px 45px 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transform: rotate(calc(var(--r) * 1deg));
            transition: transform 0.3s;
            position: relative;
            width: 200px;
        }

        body:not(.view-only) .polaroid {
            cursor: pointer;
        }

        body:not(.view-only) .polaroid:hover {
            transform: scale(1.05) rotate(0deg);
            z-index: 5;
        }

        .photo-slot {
            width: 170px;
            height: 170px;
            background: #f7f7f7;
            border: 1px inset rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .photo-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-slot span {
            font-size: 2.5rem;
            color: #ffccd5;
        }

        .polaroid-caption {
            font-family: 'Dancing Script', cursive;
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            color: #555;
        }

        .file-input { display: none; }

        /* Action Footer Section */
        .footer-actions {
            margin: 40px 0 60px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-share, .btn-create-own {
            background: linear-gradient(135deg, #e84393 0%, #d63031 100%);
            color: white;
            border: none;
            padding: 15px 35px;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(214, 48, 49, 0.3);
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-create-own {
            background: linear-gradient(135deg, #ff7675 0%, #e84393 100%);
        }

        .btn-share:hover, .btn-create-own:hover {
            transform: scale(1.03);
        }

        .share-url-box {
            background: white;
            border: 1px solid #ffccd5;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
            max-width: 400px;
            word-break: break-all;
            display: none;
            text-align: center;
        }

        /* Hidden by default, only shows up for the recipient */
        #recipientPanel {
            display: none;
            margin: 40px 0 60px 0;
        }
    </style>
</head>
<body>

    <div class="music-bar">
        <span style="font-size: 0.9rem; color: #d63031; font-weight: bold;">🎵 Soundtrack:</span>
        <button class="spotify-btn" onclick="openSpotify()">Select Music on Spotify</button>
    </div>

    <div class="envelope-back">
        <div class="vintage-paper">
            <div class="final-text" id="viewLetterText"></div>
        </div>
    </div>

    <h2 class="gallery-title">Our Memory Lane</h2>
    
    <div class="polaroid-container">
        <div class="polaroid" style="--r: -4" onclick="triggerUpload(1)">
            <div class="photo-slot" id="slot-1"><span>♥</span></div>
            <input type="file" id="file-1" class="file-input" accept="image/*" onchange="displayImage(this, 1)">
        </div>

        <div class="polaroid" style="--r: 3" onclick="triggerUpload(2)">
            <div class="photo-slot" id="slot-2"><span>♥</span></div>
            <input type="file" id="file-2" class="file-input" accept="image/*" onchange="displayImage(this, 2)">
        </div>

        <div class="polaroid" style="--r: -2" onclick="triggerUpload(3)">
            <div class="photo-slot" id="slot-3"><span>♥</span></div>
            <input type="file" id="file-3" class="file-input" accept="image/*" onchange="displayImage(this, 3)">
        </div>

        <div class="polaroid" style="--r: 5" onclick="triggerUpload(4)">
            <div class="photo-slot" id="slot-4"><span>♥</span></div>
            <input type="file" id="file-4" class="file-input" accept="image/*" onchange="displayImage(this, 4)">
        </div>

        <div class="polaroid" style="--r: -5" onclick="triggerUpload(5)">
            <div class="photo-slot" id="slot-5"><span>♥</span></div>
            <input type="file" id="file-5" class="file-input" accept="image/*" onchange="displayImage(this, 5)">
        </div>
    </div>

    <div class="footer-actions" id="creatorPanel">
        <button class="btn-share" onclick="generateShareLink()">✨ Create Shareable Link</button>
        <div class="share-url-box" id="urlBox"></div>
    </div>

    <div id="recipientPanel">
        <a href="index.html" class="btn-create-own">💝 Create My Own Paper Cupid</a>
    </div>

    <script>
        let loadedImages = {};

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sharedLetter = urlParams.get('letter');

            if (sharedLetter) {
                // RECIPIENT MODE
                document.body.classList.add('view-only');
                document.getElementById('creatorPanel').style.display = 'none'; // Hide share panel
                document.getElementById('recipientPanel').style.display = 'block'; // Show "Create My Own" button
                
                document.getElementById('viewLetterText').innerText = decodeURIComponent(atob(sharedLetter));
                
                for (let i = 1; i <= 5; i++) {
                    const imgData = urlParams.get(`img${i}`);
                    if (imgData) {
                        document.getElementById(`slot-${i}`).innerHTML = `<img src="${decodeURIComponent(imgData)}" alt="Memory">`;
                    }
                }
            } else {
                // CREATOR MODE
                const letterText = localStorage.getItem('savedLetterText');
                document.getElementById('viewLetterText').innerText = letterText || "Write your letter first!";
            }
        });

        function openSpotify() {
            window.open('https://open.spotify.com/search', '_blank');
        }

        function triggerUpload(id) {
            if (document.body.classList.contains('view-only')) return;
            document.getElementById(`file-${id}`).click();
        }

        function displayImage(input, id) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64String = e.target.result;
                    loadedImages[id] = base64String;
                    document.getElementById(`slot-${id}`).innerHTML = `<img src="${base64String}" alt="Memory">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function generateShareLink() {
            const letterText = document.getElementById('viewLetterText').innerText;
            const base64Letter = btoa(encodeURIComponent(letterText));
            
            let basePath = window.location.href.replace('letter.html', 'index.html');
            let shareUrl = `${basePath}?letter=${base64Letter}`;

            for (let i = 1; i <= 5; i++) {
                if (loadedImages[i]) {
                    shareUrl += `&img${i}=${encodeURIComponent(loadedImages[i])}`;
                }
            }

            const urlBox = document.getElementById('urlBox');
            urlBox.innerText = shareUrl;
            urlBox.style.display = 'block';
            
            navigator.clipboard.writeText(shareUrl);
            alert("Magical link copied to your clipboard! Share it with your favorite person.");
        }
    </script>
</body>
</html>
